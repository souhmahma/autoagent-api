name: AutoAgent API — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  # Supprime les warnings Node.js 20 et prépare le passage à Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Variables globales pour les tests
  SECRET_KEY: "b262fe9bfb9a419f40f6ca8a69f77db2baeb1c5980ae165eba5485d207aa2bbf"
  GOOGLE_API_KEY: "dummy-key-for-testing" # Évite que l'agent plante au démarrage

jobs:
  # ─── JOB 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 app/ --max-line-length=100 --exclude=__pycache__

      - name: Check black formatting
        run: black --check app/ --line-length 100

      - name: Check import order
        run: isort --check-only app/

  # ─── JOB 2: Unit Tests ───────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        env:
          DATABASE_URL: "sqlite:///./test_unit.db"
        run: |
          pytest tests/unit/ -v --cov=app --cov-report=xml -m "not integration and not e2e"

      - name: Upload unit coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml
          flags: unit

  # ─── JOB 3: Integration Tests ────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run integration tests
        env:
          DATABASE_URL: "sqlite:///./test_integration.db"
        run: pytest tests/integration/ -v --cov=app --cov-report=xml

  # ─── JOB 4: E2E Tests ────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run E2E tests
        env:
          DATABASE_URL: "sqlite:///./test_e2e.db"
        run: pytest tests/e2e/ -v

  # ─── JOB 5: Security Scan ────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r app/ -ll --exclude app/tests

  # ─── JOB 6: Docker Build ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t autoagent-api:${{ github.sha }} .

      - name: Test Docker image starts
        run: |
          docker run -d --name test-api \
            -e SECRET_KEY=${{ env.SECRET_KEY }} \
            -e DATABASE_URL=sqlite:///./test.db \
            -e GOOGLE_API_KEY=dummy-key \
            -p 8000:8000 \
            autoagent-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api

  # ─── JOB 7: Deploy (main only) ───────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [e2e-tests, docker-build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy notification
        run: |
          echo "✅ Tous les tests sont au vert. Déploiement autorisé."
          echo "SHA: ${{ github.sha }}"
